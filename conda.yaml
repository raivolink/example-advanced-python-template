# For more details on the format and content:
# https://github.com/robocorp/rcc/blob/master/docs/recipes.md#what-is-in-condayaml
# Tip: Adding a link to the release notes of the packages helps maintenance and security.

channels:
  - conda-forge

dependencies:
  - python=3.12.11                  # https://pyreadiness.org/3.12
  - uv=0.6.11                       # https://github.com/astral-sh/uv
  # DEV dependencies
  - pytest=8.4.1                    # https://pypi.org/project/pytest
  - python-dotenv=1.1.1             # https://pypi.org/project/python-dotenv
  - pip:
      - robocorp==3.0.0             # https://pypi.org/project/robocorp
      - robocorp-browser==2.3.5     # https://pypi.org/project/robocorp-browser
      - robocorp-log-pytest==0.0.5  # https://pypi.org/project/robocorp-log-pytest
      - robocorp-excel==0.4.5       # https://pypi.org/project/robocorp-excel
      - prodict==0.8.20             # https://pypi.org/project/prodict
